# Server Configuration
server.port=8080

# Gemini API Configuration
# Priority: 1. Environment variable GEMINI_API_KEY, 2. Direct value below
# For Docker: Use environment variable
# For local: Either set env var or change the value below directly
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models
gemini.api.model=gemini-2.5-flash

# Template Configuration
template.directory=classpath:/templates

# CORS Configuration (for React frontend - including Docker)
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:80,https://release-note-maker.netlify.app/

# File Export Configuration
export.max-content-length=10485760