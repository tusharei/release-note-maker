version: '3.8'

services:
  release-note-maker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: release-note-maker
    ports:
      - "80:80"   # Nginx (Frontend)
      - "8080:8080" # Spring Boot (Backend API)
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    driver: bridge
